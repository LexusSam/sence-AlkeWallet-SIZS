<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!--font awesome-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--link to bootstrap css-->
    <link rel="stylesheet" href="../css/styles.css"> <!--link to css-->
</head>

<body>
    <header class="text-center">
        <h1>Alke Wallet</h1>
    </header>

    <main id="register">
        <div class="form">
            <div id="message"></div><!--Error message-->
            <h2 class="text-center mb-4">Register</h2>
            <form id="form-register">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name:</label>
                    <input type="text" class="form-control" name="name" id="name">
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" class="form-control" name="username" id="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" id="password">
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password:</label>
                    <input type="password" class="form-control" name="confirm-password" id="confirm_password">
                </div>
                <button type="submit" class="btn btn-dark mt-3 w-100">Register</button>
            </form>

        </div>
    </main>

    <footer class="text-center">
        <p>© 2026 - <em>Alke Wallet</em></p>
    </footer>

    <script>
        document.getElementById("form-register").addEventListener("submit", function (event) {
            event.preventDefault();

    /*declarar la variable y asignarle el valor sacado del input*/
    const name = document.getElementById("name").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    /*validacion de password*/
    if (password !== confirmPassword) {
        document.getElementById("message").innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
        Passwords don't match
        <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
        </div>
        `
        return;
    };
    /*agregar usuario nuevo */
    const newUser = {
        name,
        username,
        password
    }
    /*guardar a nuevo usuario en el almacenamiento local*/
    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.push(newUser);

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("message").innerHTML = `
        <div class="alert alert-success alert-dismissible fade show" role="alert">
        Successfully registered. Redirecting...
        <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
        </div>
        `
    setTimeout(() => {
        window.location.href = "login.html";
    }, 3000);

});

    </script><!--javascript script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script> <!--bootstrap javascript-->
</body>

</html>>
