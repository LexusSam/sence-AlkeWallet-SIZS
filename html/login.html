<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!--font awesome-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--link to bootstrap css-->
    <link rel="stylesheet" href="../css/styles.css"> <!--link to css-->
</head>

<body>
    <header class="text-center">
        <h1>Alke Wallet</h1>
    </header>

    <main id="login">
        <div class="form">
            <div id="message"></div><!--Error message-->
            <h2 class="text-center mb-4">Login</h2>
            <form id="form-login">
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" class="form-control" name="username" id="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" id="password">
                </div>
                <button type="submit" class="btn btn-dark mt-3 w-100">Login</button>
            </form>
        </div>
    </main>

    <footer class="text-center">
        <p>© 2026 - <em>Alke Wallet</em></p>
    </footer>

    <script>
        document.getElementById("form-login").addEventListener("submit", function (event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const userFound = users.find(function (user) {
                return user.username === username && user.password === password;
            })
            if (userFound) {

                localStorage.setItem("userLogged", JSON.stringify(userFound))
                document.getElementById("message").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                Successfully logged in. Redirecting...
                <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
                </div>
                `;
                setTimeout(() => {
                    window.location.href = "menu.html";
                }, 3000);
            }
            else {
                document.getElementById("message").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                Invalid username or password.
                <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
                </div>
                `
                setTimeout(() => {
                    document.getElementById("message").innerHTML = "";
                }, 3000);
            }
        form.reset();
    });

    </script><!--javascript script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script> <!--bootstrap javascript-->
</body>

</html>
