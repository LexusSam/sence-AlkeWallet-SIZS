<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header class="mb-5">
        <nav id="nav-cont" class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a id="alke-a" class="navbar-brand" href="menu.html">Alke Wallet</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="menu.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="deposit.html">Deposit</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="sendmoney.html">Send Money</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="transactions.html">Transactions</a>
                        </li>
                        <li class="nav-item">
                            <a id="log-out-button" class="nav-link" href="login.html">Log out</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="d-flex flex-column align-items-center justify-content-center min-vh-100"">

        <section class=" container">
        <div class="row justify-content-center">
            <div class="col-10 col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Transaction History</h2>
                        <div id="transactionList" class="list-group shadow-sm"></div>
                    </div>
                </div>
            </div>
        </div>
        </section>
    </main>

    <footer class="text-center mt-5">
        <p>© 2026 - <em>Alke Wallet</em></p>
    </footer>

    <script>
/*declara la variable de transaccion y saca el valor e informacion del almacenamiento local si no existe la crea en un array vacio*/
        const transactions = JSON.parse(localStorage.getItem("transactions")) || [];
        const transactionList = document.getElementById("transactionList");
/*si no hay transacciones el mensaje sera mostrado*/
        if (transactions.length === 0) {
            transactionList.innerHTML = `<div class="alert alert-info">No transactions yet.</div>`;
/*en el caso de tener movimeintos en la cuenta estos seran mostrados con nombre fecha y hora mas el monto*/
        } else {
            transactions.forEach(tx => {
                const item = document.createElement("div");
                item.className = "list-group-item d-flex justify-content-between align-items-center";

                let label = tx.type === "deposit"
                    ? `<strong>Deposit</strong><br><small>${tx.date}</small>`
                    : `<strong>To:</strong> ${tx.recipient}<br><small>${tx.date}</small>`;
/*muestra el monto retirado en color verde*/
                let badgeClass = tx.type === "deposit" ? "bg-primary" : "bg-success";

                item.innerHTML = `
    <div>${label}</div>
    <span class="badge ${badgeClass} rounded-pill">
    $${tx.amount.toLocaleString("es-CL")}
    </span>
    `;
                transactionList.appendChild(item);
            }); /* <-- cerrar apropiadamente el forEach loop*/
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
