<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!--font awesome-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--link to bootstrap css-->
    <link rel="stylesheet" href="../css/styles.css"> <!--link to css-->
</head>

<body>
    <header class="mb-5">
        <nav id="nav-cont" class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a id="alke-a" class="navbar-brand" href="menu.html">Alke Wallet</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="menu.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="deposit.html">Deposit</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="sendmoney.html">Send Money</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="transactions.html">Transactions</a>
                        </li>
                        <li class="nav-item">
                            <a id="log-out-button" class="nav-link" href="login.html">Log out</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main id="deposit-money" class="d-flex flex-column align-items-center justify-content-center min-vh-100">
        <!-- Balance -->
        <section class="container">
            <div class="row justify-content-center mb-5">
                <div class="col-10 col-md-8">
                    <div class="card wallet-balance shadow-sm">
                        <div class="text-center">
                            <h2>Balance</h2>
                            <span class="balance"></span>
                            <p class="mb-0">Current balance</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Message -->
        <section class="container mb-4">
            <div class="row justify-content-center">
                <div class="col-10 col-md-6">
                    <div id="mensaje"></div>
                </div>
            </div>
        </section>

        <!-- Deposit Form -->
        <section class="container">
            <div class="row justify-content-center">
                <div class="col-10 col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h3 class="text-center mb-4">Deposit Money</h3>
                            <form id="formDeposito">
                                <div class="mb-3">
                                    <label class="form-label">Amount to deposit</label>
                                    <input type="number" class="form-control" id="montoDeposito" min="1" required>
                                </div>
                                <button type="submit" class="btn btn-dark w-100">Make deposit</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
/*this makes the balance show on the screen*/
        if (localStorage.getItem("balance") === null) {
            localStorage.setItem("balance", 100000);
        }

        let balance = Number(localStorage.getItem("balance"));
        document.querySelector(".balance").textContent =
            "$" + balance.toLocaleString("es-CL");
        
        const form = document.getElementById("formDeposito");
        const mensajeElement = document.getElementById("mensaje");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const amount = parseInt(document.getElementById("montoDeposito").value);

            if (amount > 0) {
                // Get current balance from localStorage
                let balance = Number(localStorage.getItem("balance")) || 0;

                // Add deposit
                balance += amount;

                // Save new balance
                localStorage.setItem("balance", balance);

                // Show success message
                mensajeElement.innerHTML = `
        <div class="alert alert-success alert-dismissible fade show" role="alert">
        Deposit successful! New balance: $${balance.toLocaleString("es-CL")}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        `;
            } else {
                mensajeElement.innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
        Please enter a valid amount.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        `;
            }

            form.reset();
        });
    </script>
    <!--javascript script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
